version: '3.8'

services:
  # Laravel Backend
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diecast_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage:/var/www/storage
    networks:
      - diecast_network
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=diecast_empire_db
      - DB_USERNAME=diecast_user
      - DB_PASSWORD=diecast_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: diecast_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - diecast_network
    depends_on:
      - app

  # MySQL Primary Database (Write)
  mysql:
    image: mysql:8.0
    container_name: diecast_mysql_primary
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: diecast_empire_db
      MYSQL_USER: diecast_user
      MYSQL_PASSWORD: diecast_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf.d/performance.cnf:/etc/mysql/conf.d/performance.cnf:ro
    networks:
      - diecast_network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Read Replica 1 (Read)
  mysql_replica_1:
    image: mysql:8.0
    container_name: diecast_mysql_replica_1
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: diecast_empire_db
      MYSQL_USER: diecast_user
      MYSQL_PASSWORD: diecast_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_MASTER_HOST: mysql
      MYSQL_MASTER_PORT: 3306
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_password
    volumes:
      - mysql_replica_1_data:/var/lib/mysql
      - ./docker/mysql/conf.d/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
    networks:
      - diecast_network
    depends_on:
      mysql:
        condition: service_healthy
    command: --default-authentication-plugin=mysql_native_password --server-id=2

  # MySQL Read Replica 2 (Read)
  mysql_replica_2:
    image: mysql:8.0
    container_name: diecast_mysql_replica_2
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: diecast_empire_db
      MYSQL_USER: diecast_user
      MYSQL_PASSWORD: diecast_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_MASTER_HOST: mysql
      MYSQL_MASTER_PORT: 3306
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_password
    volumes:
      - mysql_replica_2_data:/var/lib/mysql
      - ./docker/mysql/conf.d/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
    networks:
      - diecast_network
    depends_on:
      mysql:
        condition: service_healthy
    command: --default-authentication-plugin=mysql_native_password --server-id=3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: diecast_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - diecast_network
    command: redis-server --appendonly yes

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diecast_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - diecast_network
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
      - CHOKIDAR_USEPOLLING=true

volumes:
  mysql_data:
  mysql_replica_1_data:
  mysql_replica_2_data:
  redis_data:

networks:
  diecast_network:
    driver: bridge