name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: diecast_empire_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, mysql, redis
          coverage: xdebug

      - name: Install Composer dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Copy environment file
        working-directory: ./backend
        run: cp .env.example .env

      - name: Generate application key
        working-directory: ./backend
        run: php artisan key:generate

      - name: Run database migrations
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: diecast_empire_test
          DB_USERNAME: root
          DB_PASSWORD: root_password
          REDIS_HOST: 127.0.0.1
        run: php artisan migrate --force

      - name: Run unit tests
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: diecast_empire_test
          DB_USERNAME: root
          DB_PASSWORD: root_password
          REDIS_HOST: 127.0.0.1
        run: php artisan test --testsuite=Unit

      - name: Run feature tests
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: diecast_empire_test
          DB_USERNAME: root
          DB_PASSWORD: root_password
          REDIS_HOST: 127.0.0.1
        run: php artisan test --testsuite=Feature

      - name: Run property-based tests
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: diecast_empire_test
          DB_USERNAME: root
          DB_PASSWORD: root_password
          REDIS_HOST: 127.0.0.1
        run: php artisan test --filter=Property

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Build application
        working-directory: ./frontend
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run security scan on backend
        working-directory: ./backend
        run: |
          composer require --dev enlightn/security-checker
          vendor/bin/security-checker security:check composer.lock

      - name: Run security scan on frontend
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Build and push Docker images
        run: |
          docker-compose -f docker-compose.staging.yml build
          docker-compose -f docker-compose.staging.yml push

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add deployment commands here

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # Add smoke test commands here

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://diecastempire.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Build and push Docker images
        run: |
          docker-compose -f docker-compose.production.yml build
          docker-compose -f docker-compose.production.yml push

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add deployment commands here

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on production..."
          # Add smoke test commands here

      - name: Notify deployment
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add notification commands here
